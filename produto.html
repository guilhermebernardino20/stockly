<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stockly — Cadastro de Produto</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="card card--wide">
  <h1>Cadastro de Produto</h1>
  <p class="subtitle">Adicione produtos ao estoque</p>

  <form id="produtoForm">

    <fieldset>
      <legend>Dados do Produto</legend>

      <label for="codigo">Código de Barras</label>
      <input type="text" id="codigo" placeholder="Bipar ou digitar código" />

      <label for="nomeProduto">Nome do Produto</label>
      <input type="text" id="nomeProduto" placeholder="Ex: Coca-Cola 2L" />

      <label for="categoria">Categoria</label>
      <input type="text" id="categoria" placeholder="Ex: Bebidas" />

      <label for="quantidade">Quantidade</label>
      <input type="number" id="quantidade" placeholder="0" />

      <label for="precoCusto">Preço de Custo (R$)</label>
      <input type="number" step="0.01" id="precoCusto" placeholder="0.00" />

      <label for="precoVenda">Preço de Venda (R$)</label>
      <input type="number" step="0.01" id="precoVenda" placeholder="0.00" />

    </fieldset>

    <button type="submit">Salvar Produto</button>
  </form>

  <p class="msg" id="msg"></p>
</div>

<script src="js/produto.js"></script>
</body>
</html>
